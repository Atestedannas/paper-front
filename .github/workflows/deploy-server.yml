name: Deploy to Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          VITE_BASE_PATH: /

      - name: Deploy via SSH
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ARGS: -rlgoDzvc -i --delete
          REMOTE_HOST: 119.91.157.252
          REMOTE_USER: root
          TARGET: /opt/paper/
          SOURCE: dist/
          SCRIPT_AFTER: |
            echo "Deployed index asset paths:"
            grep -oE '(src|href)="[^"]+"' /opt/paper/index.html || true
            test -f /opt/paper/index.html
            test -d /opt/paper/assets
          SCRIPT_AFTER_REQUIRED: true
